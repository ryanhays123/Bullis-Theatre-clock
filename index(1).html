<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clock Control and View</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #050816;
      --panel: #10182d;
      --text: #f8fafc;
      --muted: #a9b4c7;
      --line: rgba(255, 255, 255, 0.12);
      --blue: #3b82f6;
      --red: #ef4444;
      --green: #22c55e;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    button, input, textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: none;
    }

    .control-page {
      min-height: 100vh;
      padding: 36px;
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.24), transparent 32%),
        radial-gradient(circle at bottom right, rgba(239, 68, 68, 0.16), transparent 32%),
        var(--bg);
    }

    .control-wrap {
      max-width: 1150px;
      margin: 0 auto;
    }

    .control-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 28px;
    }

    .control-header h1 {
      font-size: clamp(2rem, 4vw, 3.6rem);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .control-header p {
      color: var(--muted);
      margin-top: 10px;
      max-width: 700px;
      font-size: 1rem;
    }

    .open-view {
      display: inline-block;
      white-space: nowrap;
      text-decoration: none;
      color: white;
      background: var(--blue);
      padding: 13px 18px;
      border-radius: 999px;
      font-weight: bold;
      box-shadow: 0 14px 30px rgba(59, 130, 246, 0.25);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      background: rgba(16, 24, 45, 0.88);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
    }

    .card.full {
      grid-column: 1 / -1;
    }

    .card h2 {
      font-size: 1.3rem;
      margin-bottom: 14px;
    }

    .option-group {
      display: grid;
      gap: 12px;
    }

    .radio-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--line);
    }

    .radio-card input {
      width: 18px;
      height: 18px;
    }

    .radio-card strong {
      display: block;
      margin-bottom: 2px;
    }

    .radio-card span {
      display: block;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 14px;
    }

    label.small-label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    input[type="number"], input[type="text"], textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.08);
      color: white;
      padding: 12px;
      outline: none;
    }

    textarea {
      resize: vertical;
      min-height: 115px;
      font-size: 1.05rem;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }

    .btn {
      color: white;
      padding: 12px 17px;
      border-radius: 14px;
      font-weight: bold;
      background: var(--blue);
    }

    .btn.secondary {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--line);
    }

    .btn.red {
      background: var(--red);
    }

    .btn.green {
      background: var(--green);
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--muted);
      font-size: 0.9rem;
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--green);
    }

    .view-page {
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top, rgba(59, 130, 246, 0.18), transparent 35%),
        linear-gradient(135deg, #020617, #0b1120 55%, #111827);
      color: white;
    }

    .view-stage {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(24px, 4vh, 48px);
      padding: clamp(24px, 5vw, 70px);
      transition: all 0.35s ease;
      text-align: center;
    }

    .view-stage.text-active {
      justify-content: flex-start;
      gap: 24px;
      padding-top: clamp(24px, 5vh, 48px);
    }

    .main-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(20px, 3vh, 36px);
      width: 100%;
      transition: transform 0.35s ease;
    }

    .view-stage.text-active .main-display {
      transform: scale(0.68);
      transform-origin: top center;
    }

    .digital-clock {
      font-size: clamp(5rem, 17vw, 17rem);
      font-weight: 900;
      line-height: 0.9;
      letter-spacing: -0.08em;
      text-shadow: 0 20px 60px rgba(0, 0, 0, 0.42);
    }

    .timezone-label {
      margin-top: 18px;
      font-size: clamp(1rem, 2vw, 1.7rem);
      color: rgba(255, 255, 255, 0.65);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .timer-display {
      font-size: clamp(5rem, 16vw, 16rem);
      font-weight: 900;
      line-height: 0.9;
      letter-spacing: -0.07em;
      color: white;
      text-shadow: 0 20px 60px rgba(0, 0, 0, 0.42);
    }

    .timer-label {
      font-size: clamp(1rem, 2vw, 1.6rem);
      color: rgba(255, 255, 255, 0.65);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 700;
      margin-top: 14px;
    }

    .combo .digital-clock {
      font-size: clamp(3.8rem, 11vw, 11rem);
    }

    .combo .timer-display {
      font-size: clamp(3.8rem, 10vw, 10rem);
      color: #bfdbfe;
    }

    .analog-clock {
      position: relative;
      width: min(66vw, 66vh, 620px);
      height: min(66vw, 66vh, 620px);
      border-radius: 50%;
      border: clamp(8px, 1.2vw, 14px) solid rgba(255, 255, 255, 0.92);
      background:
        radial-gradient(circle at center, rgba(255, 255, 255, 0.12), transparent 58%),
        rgba(255, 255, 255, 0.04);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.45), inset 0 0 30px rgba(255, 255, 255, 0.08);
    }

    .combo .analog-clock {
      width: min(44vw, 44vh, 430px);
      height: min(44vw, 44vh, 430px);
    }

    .clock-number {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 44px;
      height: 44px;
      margin-left: -22px;
      margin-top: -22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.4rem, 2.4vw, 2.2rem);
      font-weight: 800;
    }

    .hand {
      position: absolute;
      left: 50%;
      bottom: 50%;
      transform-origin: bottom center;
      border-radius: 999px;
      background: white;
    }

    .hand.hour {
      width: 12px;
      height: 27%;
      margin-left: -6px;
    }

    .hand.minute {
      width: 8px;
      height: 37%;
      margin-left: -4px;
      background: #dbeafe;
    }

    .hand.second {
      width: 4px;
      height: 42%;
      margin-left: -2px;
      background: var(--red);
    }

    .center-dot {
      position: absolute;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: var(--red);
      border: 5px solid white;
    }

    .message-display {
      display: none;
      width: min(92vw, 1400px);
      padding: clamp(22px, 4vw, 48px);
      border-radius: 34px;
      background: rgba(239, 68, 68, 0.16);
      border: 1px solid rgba(248, 113, 113, 0.34);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.38);
      font-size: clamp(3rem, 8vw, 9rem);
      font-weight: 900;
      line-height: 1.02;
      letter-spacing: -0.05em;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .view-stage.text-active .message-display {
      display: block;
    }

    @media (max-width: 850px) {
      .control-page {
        padding: 22px;
      }

      .control-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .grid, .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const STORAGE_KEY = "east_coast_clock_control_view_state_v1";
    const TIME_ZONE = "America/New_York";

    const defaultState = {
      clockType: "digital",
      displayMode: "clock",
      timerType: "countdown",
      countdownSeconds: 300,
      timerRunning: false,
      timerStartedAt: null,
      timerPausedElapsed: 0,
      message: "",
      messageVisible: false
    };

    function getState() {
      try {
        return { ...defaultState, ...JSON.parse(localStorage.getItem(STORAGE_KEY)) };
      } catch (error) {
        return { ...defaultState };
      }
    }

    function setState(nextState) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(nextState));
      window.dispatchEvent(new Event("local-state-change"));
    }

    function updateState(patch) {
      setState({ ...getState(), ...patch });
    }

    function formatTimer(totalSeconds) {
      const sign = totalSeconds < 0 ? "-" : "";
      const abs = Math.abs(Math.floor(totalSeconds));
      const hours = Math.floor(abs / 3600);
      const minutes = Math.floor((abs % 3600) / 60);
      const seconds = abs % 60;

      if (hours > 0) {
        return `${sign}${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
      }

      return `${sign}${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
    }

    function getElapsedSeconds(state) {
      const baseElapsed = state.timerPausedElapsed || 0;
      if (!state.timerRunning || !state.timerStartedAt) return baseElapsed;
      return baseElapsed + Math.floor((Date.now() - state.timerStartedAt) / 1000);
    }

    function getTimerSeconds(state) {
      const elapsed = getElapsedSeconds(state);
      if (state.timerType === "countdown") {
        return Math.max(0, state.countdownSeconds - elapsed);
      }
      return elapsed;
    }

    function getEastCoastParts() {
      const formatter = new Intl.DateTimeFormat("en-US", {
        timeZone: TIME_ZONE,
        hour: "numeric",
        minute: "2-digit",
        second: "2-digit",
        hour12: true
      });

      const parts = formatter.formatToParts(new Date());
      const get = type => parts.find(part => part.type === type)?.value;

      return {
        hour: Number(get("hour")),
        minute: Number(get("minute")),
        second: Number(get("second")),
        dayPeriod: get("dayPeriod") || ""
      };
    }

    function getEastCoastDigitalTime() {
      const parts = getEastCoastParts();
      return `${parts.hour}:${String(parts.minute).padStart(2, "0")}:${String(parts.second).padStart(2, "0")} ${parts.dayPeriod}`;
    }

    function getEastCoastAngles() {
      const parts = getEastCoastParts();
      const hour12 = parts.hour % 12;
      const hourAngle = (hour12 * 30) + (parts.minute * 0.5) + (parts.second * (0.5 / 60));
      const minuteAngle = (parts.minute * 6) + (parts.second * 0.1);
      const secondAngle = parts.second * 6;

      return { hourAngle, minuteAngle, secondAngle };
    }

    function renderControlPage() {
      const app = document.getElementById("app");
      const state = getState();
      const viewURL = `${window.location.pathname}?view=1`;
      const countdownMinutes = Math.floor(state.countdownSeconds / 60);
      const countdownSeconds = state.countdownSeconds % 60;

      app.innerHTML = `
        <main class="control-page">
          <div class="control-wrap">
            <header class="control-header">
              <div>
                <h1>Clock Display Control</h1>
                <p>Use this page to control the screen. Open the view page in another tab, window, projector, or display. The clocks are set to East Coast time, New York.</p>
              </div>
              <a class="open-view" href="${viewURL}" target="_blank">Open View Page</a>
            </header>

            <section class="grid">
              <div class="card">
                <h2>1. Choose Clock Type</h2>
                <div class="option-group">
                  <label class="radio-card">
                    <input type="radio" name="clockType" value="digital" ${state.clockType === "digital" ? "checked" : ""}>
                    <div>
                      <strong>Full Screen Digital Clock</strong>
                      <span>Large digital clock using New York / East Coast time.</span>
                    </div>
                  </label>

                  <label class="radio-card">
                    <input type="radio" name="clockType" value="analog" ${state.clockType === "analog" ? "checked" : ""}>
                    <div>
                      <strong>Full Screen Analog Clock</strong>
                      <span>Classic clock face using New York / East Coast time.</span>
                    </div>
                  </label>
                </div>
              </div>

              <div class="card">
                <h2>2. Choose Display Mode</h2>
                <div class="option-group">
                  <label class="radio-card">
                    <input type="radio" name="displayMode" value="clock" ${state.displayMode === "clock" ? "checked" : ""}>
                    <div>
                      <strong>Clock Only</strong>
                      <span>Shows the selected clock full screen.</span>
                    </div>
                  </label>

                  <label class="radio-card">
                    <input type="radio" name="displayMode" value="combo" ${state.displayMode === "combo" ? "checked" : ""}>
                    <div>
                      <strong>Clock + Count Up / Count Down</strong>
                      <span>Shows the selected clock with the timer below it.</span>
                    </div>
                  </label>

                  <label class="radio-card">
                    <input type="radio" name="displayMode" value="timer" ${state.displayMode === "timer" ? "checked" : ""}>
                    <div>
                      <strong>Timer Only</strong>
                      <span>Shows count up or count down full screen.</span>
                    </div>
                  </label>
                </div>
              </div>

              <div class="card">
                <h2>3. Timer Settings</h2>
                <div class="option-group">
                  <label class="radio-card">
                    <input type="radio" name="timerType" value="countdown" ${state.timerType === "countdown" ? "checked" : ""}>
                    <div>
                      <strong>Count Down</strong>
                      <span>Counts down from the time you choose.</span>
                    </div>
                  </label>

                  <label class="radio-card">
                    <input type="radio" name="timerType" value="countup" ${state.timerType === "countup" ? "checked" : ""}>
                    <div>
                      <strong>Count Up</strong>
                      <span>Counts up from zero.</span>
                    </div>
                  </label>
                </div>

                <div class="form-row">
                  <label class="small-label">
                    Minutes
                    <input id="minutesInput" type="number" min="0" value="${countdownMinutes}">
                  </label>
                  <label class="small-label">
                    Seconds
                    <input id="secondsInput" type="number" min="0" max="59" value="${countdownSeconds}">
                  </label>
                  <label class="small-label">
                    Current Timer
                    <input type="text" value="${formatTimer(getTimerSeconds(state))}" readonly>
                  </label>
                </div>

                <div class="button-row">
                  <button class="btn" id="applyTimeBtn">Apply Time</button>
                  <button class="btn green" id="startPauseBtn">${state.timerRunning ? "Pause" : "Start"}</button>
                  <button class="btn secondary" id="resetBtn">Reset</button>
                </div>
              </div>

              <div class="card">
                <h2>4. Screen Text</h2>
                <textarea id="messageInput" placeholder="Type words to show on the view screen...">${state.message || ""}</textarea>

                <div class="button-row">
                  <button class="btn ${state.messageVisible ? "green" : "red"}" id="showHideBtn">
                    ${state.messageVisible ? "Hide" : "Show"}
                  </button>
                  <button class="btn secondary" id="clearTextBtn">Clear Text</button>
                </div>

                <div class="status-pill">
                  <span class="status-dot"></span>
                  <span>${state.messageVisible ? "Text is showing. The clock/timer will shrink and move higher." : "Text is hidden. The clock/timer is full screen."}</span>
                </div>
              </div>

              <div class="card full">
                <h2>How to Use</h2>
                <p style="color: var(--muted); max-width: 900px;">
                  Save this file as <strong>index.html</strong>. Open the normal page as the control page. Click <strong>Open View Page</strong> to open the audience/projector page. Changes you make here update the view page automatically as long as both pages are open in the same browser.
                </p>
              </div>
            </section>
          </div>
        </main>
      `;

      document.querySelectorAll('input[name="clockType"]').forEach(input => {
        input.addEventListener("change", () => updateState({ clockType: input.value }));
      });

      document.querySelectorAll('input[name="displayMode"]').forEach(input => {
        input.addEventListener("change", () => updateState({ displayMode: input.value }));
      });

      document.querySelectorAll('input[name="timerType"]').forEach(input => {
        input.addEventListener("change", () => {
          updateState({
            timerType: input.value,
            timerRunning: false,
            timerPausedElapsed: 0,
            timerStartedAt: null
          });
          renderControlPage();
        });
      });

      document.getElementById("applyTimeBtn").addEventListener("click", () => {
        const minutes = Math.max(0, Number(document.getElementById("minutesInput").value) || 0);
        const seconds = Math.min(59, Math.max(0, Number(document.getElementById("secondsInput").value) || 0));
        updateState({
          countdownSeconds: minutes * 60 + seconds,
          timerRunning: false,
          timerPausedElapsed: 0,
          timerStartedAt: null
        });
        renderControlPage();
      });

      document.getElementById("startPauseBtn").addEventListener("click", () => {
        const current = getState();
        if (current.timerRunning) {
          updateState({
            timerRunning: false,
            timerPausedElapsed: getElapsedSeconds(current),
            timerStartedAt: null
          });
        } else {
          updateState({
            timerRunning: true,
            timerStartedAt: Date.now()
          });
        }
        renderControlPage();
      });

      document.getElementById("resetBtn").addEventListener("click", () => {
        updateState({
          timerRunning: false,
          timerPausedElapsed: 0,
          timerStartedAt: null
        });
        renderControlPage();
      });

      document.getElementById("messageInput").addEventListener("input", event => {
        updateState({ message: event.target.value });
      });

      document.getElementById("showHideBtn").addEventListener("click", () => {
        const current = getState();
        updateState({
          messageVisible: !current.messageVisible,
          message: document.getElementById("messageInput").value
        });
        renderControlPage();
      });

      document.getElementById("clearTextBtn").addEventListener("click", () => {
        updateState({ message: "", messageVisible: false });
        renderControlPage();
      });
    }

    function createAnalogClock() {
      const numbers = Array.from({ length: 12 }, (_, index) => {
        const number = index + 1;
        const angle = number * 30;
        const radius = 42;
        const x = Math.sin(angle * Math.PI / 180) * radius;
        const y = -Math.cos(angle * Math.PI / 180) * radius;
        return `<div class="clock-number" style="transform: translate(${x}vmin, ${y}vmin);">${number}</div>`;
      }).join("");

      return `
        <div>
          <div class="analog-clock">
            ${numbers}
            <div class="hand hour" id="hourHand"></div>
            <div class="hand minute" id="minuteHand"></div>
            <div class="hand second" id="secondHand"></div>
            <div class="center-dot"></div>
          </div>
          <div class="timezone-label">New York Time</div>
        </div>
      `;
    }

    function createClockHTML(state) {
      if (state.clockType === "analog") {
        return createAnalogClock();
      }

      return `
        <div>
          <div class="digital-clock" id="digitalClock">--:--:--</div>
          <div class="timezone-label">New York Time</div>
        </div>
      `;
    }

    function createTimerHTML(state) {
      return `
        <div>
          <div class="timer-display" id="timerDisplay">${formatTimer(getTimerSeconds(state))}</div>
          <div class="timer-label">${state.timerType === "countdown" ? "Countdown" : "Count Up"}</div>
        </div>
      `;
    }

    function renderViewPage() {
      const app = document.getElementById("app");
      const state = getState();
      const hasVisibleMessage = state.messageVisible && state.message.trim().length > 0;
      let mainHTML = "";
      let modeClass = "";

      if (state.displayMode === "clock") {
        mainHTML = createClockHTML(state);
      } else if (state.displayMode === "timer") {
        mainHTML = createTimerHTML(state);
      } else {
        modeClass = "combo";
        mainHTML = createClockHTML(state) + createTimerHTML(state);
      }

      app.innerHTML = `
        <main class="view-page">
          <section class="view-stage ${hasVisibleMessage ? "text-active" : ""}">
            <div class="main-display ${modeClass}">
              ${mainHTML}
            </div>
            <div class="message-display">${escapeHTML(state.message)}</div>
          </section>
        </main>
      `;

      updateViewDisplays();
    }

    function updateViewDisplays() {
      const state = getState();

      const digitalClock = document.getElementById("digitalClock");
      if (digitalClock) {
        digitalClock.textContent = getEastCoastDigitalTime();
      }

      const hourHand = document.getElementById("hourHand");
      const minuteHand = document.getElementById("minuteHand");
      const secondHand = document.getElementById("secondHand");
      if (hourHand && minuteHand && secondHand) {
        const angles = getEastCoastAngles();
        hourHand.style.transform = `rotate(${angles.hourAngle}deg)`;
        minuteHand.style.transform = `rotate(${angles.minuteAngle}deg)`;
        secondHand.style.transform = `rotate(${angles.secondAngle}deg)`;
      }

      const timerDisplay = document.getElementById("timerDisplay");
      if (timerDisplay) {
        timerDisplay.textContent = formatTimer(getTimerSeconds(state));
      }
    }

    function escapeHTML(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function isViewPage() {
      return new URLSearchParams(window.location.search).get("view") === "1";
    }

    if (isViewPage()) {
      renderViewPage();
      setInterval(updateViewDisplays, 250);

      window.addEventListener("storage", event => {
        if (event.key === STORAGE_KEY) renderViewPage();
      });

      window.addEventListener("local-state-change", renderViewPage);
    } else {
      renderControlPage();
      setInterval(() => {
        if (!isViewPage()) renderControlPage();
      }, 1000);
    }
  </script>
