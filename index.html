<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Remote Clock Control</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #050816;
      --panel: #10182d;
      --text: #f8fafc;
      --muted: #a9b4c7;
      --line: rgba(255, 255, 255, 0.12);
      --blue: #3b82f6;
      --red: #ef4444;
      --green: #22c55e;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: none;
    }

    .control-page,
    .setup-page {
      min-height: 100vh;
      padding: 36px;
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.24), transparent 32%),
        radial-gradient(circle at bottom right, rgba(239, 68, 68, 0.16), transparent 32%),
        var(--bg);
    }

    .wrap {
      max-width: 1150px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 28px;
    }

    .header h1 {
      font-size: clamp(2rem, 4vw, 3.6rem);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .header p {
      color: var(--muted);
      margin-top: 10px;
      max-width: 750px;
      font-size: 1rem;
    }

    .open-view {
      display: inline-block;
      white-space: nowrap;
      text-decoration: none;
      color: white;
      background: var(--blue);
      padding: 13px 18px;
      border-radius: 999px;
      font-weight: bold;
      box-shadow: 0 14px 30px rgba(59, 130, 246, 0.25);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      background: rgba(16, 24, 45, 0.88);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
    }

    .card.full {
      grid-column: 1 / -1;
    }

    .card h2 {
      font-size: 1.3rem;
      margin-bottom: 14px;
    }

    .card p {
      color: var(--muted);
      line-height: 1.6;
    }

    .option-group {
      display: grid;
      gap: 12px;
    }

    .radio-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--line);
    }

    .radio-card input {
      width: 18px;
      height: 18px;
    }

    .radio-card strong {
      display: block;
      margin-bottom: 2px;
    }

    .radio-card span {
      display: block;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 14px;
    }

    label.small-label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    input[type="number"],
    input[type="text"],
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.08);
      color: white;
      padding: 12px;
      outline: none;
    }

    textarea {
      resize: vertical;
      min-height: 115px;
      font-size: 1.05rem;
    }

    input:focus,
    textarea:focus {
      border-color: rgba(59, 130, 246, 0.8);
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }

    .btn {
      color: white;
      padding: 12px 17px;
      border-radius: 14px;
      font-weight: bold;
      background: var(--blue);
    }

    .btn.secondary {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--line);
    }

    .btn.red {
      background: var(--red);
    }

    .btn.green {
      background: var(--green);
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--muted);
      font-size: 0.9rem;
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--green);
    }

    .setup-code {
      white-space: pre-wrap;
      background: rgba(0, 0, 0, 0.28);
      border: 1px solid var(--line);
      padding: 16px;
      border-radius: 16px;
      color: #dbeafe;
      overflow-x: auto;
      margin-top: 12px;
    }

    /* VIEW PAGE - RESPONSIVE, NO OVERLAP */
    .view-page {
      height: 100dvh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top, rgba(59, 130, 246, 0.18), transparent 35%),
        linear-gradient(135deg, #020617, #0b1120 55%, #111827);
      color: white;
    }

    .view-stage {
      width: 100vw;
      height: 100dvh;
      display: grid;
      grid-template-rows: minmax(0, 1fr);
      align-items: center;
      justify-items: center;
      padding: clamp(18px, 4vw, 60px);
      text-align: center;
      overflow: hidden;
    }

    .view-stage.text-active {
      grid-template-rows: minmax(0, 42dvh) minmax(0, 1fr);
      row-gap: clamp(12px, 2dvh, 28px);
      padding-top: clamp(14px, 3dvh, 36px);
      padding-bottom: clamp(14px, 3dvh, 36px);
    }

    .main-display {
      width: 100%;
      height: 100%;
      min-height: 0;
      max-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: min(3dvh, 32px);
      overflow: hidden;
    }

    .main-display.combo {
      gap: min(2dvh, 22px);
    }

    .digital-clock,
    .timer-display {
      font-size: min(15vw, 33dvh, 15rem);
      font-weight: 900;
      line-height: 0.86;
      letter-spacing: -0.08em;
      text-shadow: 0 20px 60px rgba(0, 0, 0, 0.42);
      white-space: nowrap;
    }

    .timer-display {
      letter-spacing: -0.07em;
    }

    .combo .digital-clock {
      font-size: min(10vw, 18dvh, 9.5rem);
    }

    .combo .timer-display {
      font-size: min(10vw, 18dvh, 9.5rem);
      color: #bfdbfe;
    }

    .view-stage.text-active .digital-clock,
    .view-stage.text-active .timer-display {
      font-size: min(10vw, 16dvh, 8.5rem);
    }

    .view-stage.text-active .combo .digital-clock,
    .view-stage.text-active .combo .timer-display {
      font-size: min(7.5vw, 11dvh, 6rem);
    }

    .timezone-label,
    .timer-label {
      margin-top: min(2dvh, 18px);
      font-size: min(2vw, 2.8dvh, 1.6rem);
      color: rgba(255, 255, 255, 0.65);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 700;
      white-space: nowrap;
    }

    .analog-clock {
      position: relative;
      width: min(68vw, 68dvh, 650px);
      height: min(68vw, 68dvh, 650px);
      flex: 0 0 auto;
      border-radius: 50%;
      border: clamp(7px, 1.1vw, 14px) solid rgba(255, 255, 255, 0.92);
      background:
        radial-gradient(circle at center, rgba(255, 255, 255, 0.12), transparent 58%),
        rgba(255, 255, 255, 0.04);
      box-shadow:
        0 30px 90px rgba(0, 0, 0, 0.45),
        inset 0 0 30px rgba(255, 255, 255, 0.08);
    }

    .combo .analog-clock {
      width: min(42vw, 38dvh, 410px);
      height: min(42vw, 38dvh, 410px);
    }

    .view-stage.text-active .analog-clock {
      width: min(34vw, 27dvh, 320px);
      height: min(34vw, 27dvh, 320px);
    }

    .view-stage.text-active .combo .analog-clock {
      width: min(28vw, 22dvh, 260px);
      height: min(28vw, 22dvh, 260px);
    }

    .clock-number {
      position: absolute;
      left: var(--x);
      top: var(--y);
      transform: translate(-50%, -50%);
      font-size: min(3.2vw, 3.2dvh, 2.1rem);
      font-weight: 800;
    }

    .combo .clock-number,
    .view-stage.text-active .clock-number {
      font-size: min(2.3vw, 2.3dvh, 1.45rem);
    }

    .hand {
      position: absolute;
      left: 50%;
      bottom: 50%;
      transform-origin: bottom center;
      border-radius: 999px;
      background: white;
    }

    .hand.hour {
      width: max(7px, 1.5%);
      height: 27%;
      margin-left: max(-6px, -0.75%);
    }

    .hand.minute {
      width: max(5px, 1%);
      height: 37%;
      margin-left: max(-4px, -0.5%);
      background: #dbeafe;
    }

    .hand.second {
      width: max(3px, 0.55%);
      height: 42%;
      margin-left: max(-2px, -0.275%);
      background: var(--red);
    }

    .center-dot {
      position: absolute;
      width: min(5vw, 5dvh, 24px);
      height: min(5vw, 5dvh, 24px);
      border-radius: 50%;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: var(--red);
      border: min(1vw, 1dvh, 5px) solid white;
    }

    .message-display {
      display: none;
      width: min(94vw, 1500px);
      max-height: 52dvh;
      overflow: auto;
      padding: clamp(18px, 3vw, 44px);
      border-radius: clamp(18px, 3vw, 34px);
      background: rgba(239, 68, 68, 0.16);
      border: 1px solid rgba(248, 113, 113, 0.34);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.38);
      font-size: min(7vw, 8dvh, 8rem);
      font-weight: 900;
      line-height: 1.02;
      letter-spacing: -0.05em;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .view-stage.text-active .message-display {
      display: block;
    }

    @media (max-width: 850px) {
      .control-page,
      .setup-page {
        padding: 22px;
      }

      .header {
        flex-direction: column;
        align-items: flex-start;
      }

      .grid,
      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div id="app"></div>

  <script type="module">
    /*
      IMPORTANT:
      Replace this firebaseConfig with the one from your Firebase project.
    */
    const firebaseConfig = {
      apiKey: "PASTE-YOUR-API-KEY-HERE",
      authDomain: "PASTE-YOUR-PROJECT.firebaseapp.com",
      databaseURL: "https://PASTE-YOUR-PROJECT-default-rtdb.firebaseio.com",
      projectId: "PASTE-YOUR-PROJECT-ID",
      storageBucket: "PASTE-YOUR-PROJECT.appspot.com",
      messagingSenderId: "PASTE-YOUR-SENDER-ID",
      appId: "PASTE-YOUR-APP-ID"
    };

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getDatabase,
      ref,
      onValue,
      set,
      get
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

    const TIME_ZONE = "America/New_York";

    const defaultState = {
      clockType: "digital",
      displayMode: "clock",
      timerType: "countdown",
      countdownSeconds: 300,
      timerRunning: false,
      timerStartedAt: null,
      timerPausedElapsed: 0,
      message: "",
      messageVisible: false,
      lastUpdated: Date.now()
    };

    let db;
    let roomRef;
    let currentState = { ...defaultState };

    function configMissing() {
      return !firebaseConfig.apiKey || firebaseConfig.apiKey.includes("PASTE-YOUR");
    }

    function isViewPage() {
      return new URLSearchParams(window.location.search).get("view") === "1";
    }

    function getRoom() {
      const params = new URLSearchParams(window.location.search);
      return params.get("room") || localStorage.getItem("remote_clock_room") || "main";
    }

    function setRoom(room) {
      const clean = room.trim().replace(/[^a-zA-Z0-9_-]/g, "-") || "main";
      localStorage.setItem("remote_clock_room", clean);

      const params = new URLSearchParams(window.location.search);
      params.set("room", clean);

      if (isViewPage()) {
        params.set("view", "1");
      }

      window.location.search = params.toString();
    }

    function getViewURL() {
      const url = new URL(window.location.href);
      url.searchParams.set("view", "1");
      url.searchParams.set("room", getRoom());
      return url.toString();
    }

    function getControlURL() {
      const url = new URL(window.location.href);
      url.searchParams.delete("view");
      url.searchParams.set("room", getRoom());
      return url.toString();
    }

    async function saveState(patch) {
      currentState = {
        ...currentState,
        ...patch,
        lastUpdated: Date.now()
      };

      await set(roomRef, currentState);
    }

    function formatTimer(totalSeconds) {
      const abs = Math.abs(Math.floor(totalSeconds));
      const hours = Math.floor(abs / 3600);
      const minutes = Math.floor((abs % 3600) / 60);
      const seconds = abs % 60;

      if (hours > 0) {
        return `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
      }

      return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
    }

    function getElapsedSeconds(state) {
      const paused = state.timerPausedElapsed || 0;

      if (!state.timerRunning || !state.timerStartedAt) {
        return paused;
      }

      return paused + Math.floor((Date.now() - state.timerStartedAt) / 1000);
    }

    function getTimerSeconds(state) {
      const elapsed = getElapsedSeconds(state);

      if (state.timerType === "countdown") {
        return Math.max(0, state.countdownSeconds - elapsed);
      }

      return elapsed;
    }

    function getEastCoastParts() {
      const formatter = new Intl.DateTimeFormat("en-US", {
        timeZone: TIME_ZONE,
        hour: "numeric",
        minute: "2-digit",
        second: "2-digit",
        hour12: true
      });

      const parts = formatter.formatToParts(new Date());
      const get = type => parts.find(part => part.type === type)?.value;

      return {
        hour: Number(get("hour")),
        minute: Number(get("minute")),
        second: Number(get("second")),
        dayPeriod: get("dayPeriod") || ""
      };
    }

    function getEastCoastDigitalTime() {
      const parts = getEastCoastParts();

      return `${parts.hour}:${String(parts.minute).padStart(2, "0")}:${String(parts.second).padStart(2, "0")} ${parts.dayPeriod}`;
    }

    function getEastCoastAngles() {
      const parts = getEastCoastParts();
      const hour12 = parts.hour % 12;

      return {
        hourAngle: hour12 * 30 + parts.minute * 0.5 + parts.second * (0.5 / 60),
        minuteAngle: parts.minute * 6 + parts.second * 0.1,
        secondAngle: parts.second * 6
      };
    }

    function escapeHTML(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderSetupPage() {
      document.getElementById("app").innerHTML = `
        <main class="setup-page">
          <div class="wrap">
            <section class="card full">
              <h1 style="font-size: clamp(2rem, 4vw, 3.5rem); margin-bottom: 18px;">
                Firebase Setup Needed
              </h1>

              <p>
                This version can be controlled from any computer or phone, but first you need to connect it to Firebase Realtime Database.
              </p>

              <br>

              <p>
                Replace the placeholder <strong>firebaseConfig</strong> values in the code with your real Firebase web app config.
              </p>

              <div class="setup-code">const firebaseConfig = {
  apiKey: "PASTE-YOUR-API-KEY-HERE",
  authDomain: "PASTE-YOUR-PROJECT.firebaseapp.com",
  databaseURL: "https://PASTE-YOUR-PROJECT-default-rtdb.firebaseio.com",
  projectId: "PASTE-YOUR-PROJECT-ID",
  storageBucket: "PASTE-YOUR-PROJECT.appspot.com",
  messagingSenderId: "PASTE-YOUR-SENDER-ID",
  appId: "PASTE-YOUR-APP-ID"
};</div>

              <br>

              <p>
                After you paste the real config and upload the file again, this warning will disappear.
              </p>
            </section>
          </div>
        </main>
      `;
    }

    function renderControlPage() {
      const state = currentState;
      const countdownMinutes = Math.floor((state.countdownSeconds || 0) / 60);
      const countdownSeconds = (state.countdownSeconds || 0) % 60;

      document.getElementById("app").innerHTML = `
        <main class="control-page">
          <div class="wrap">
            <header class="header">
              <div>
                <h1>Remote Clock Control</h1>
                <p>
                  Control the auditorium display from any computer or phone. Make sure the control page and view page use the same room code.
                </p>
              </div>

              <a class="open-view" href="${getViewURL()}" target="_blank">Open View Page</a>
            </header>

            <section class="grid">
              <div class="card full">
                <h2>Room Code</h2>

                <p>
                  This connects your control page to your display page. Use a private room code, like <strong>auditorium2026</strong>.
                </p>

                <div class="form-row">
                  <label class="small-label">
                    Room Code
                    <input id="roomInput" type="text" value="${escapeHTML(getRoom())}">
                  </label>

                  <label class="small-label">
                    Control Link
                    <input type="text" value="${escapeHTML(getControlURL())}" readonly>
                  </label>

                  <label class="small-label">
                    View Link
                    <input type="text" value="${escapeHTML(getViewURL())}" readonly>
                  </label>
                </div>

                <div class="button-row">
                  <button class="btn" id="setRoomBtn">Use This Room</button>
                  <button class="btn secondary" id="copyViewBtn">Copy View Link</button>
                </div>
              </div>

              <div class="card">
                <h2>1. Choose Clock Type</h2>

                <div class="option-group">
                  <label class="radio-card">
                    <input type="radio" name="clockType" value="digital" ${state.clockType === "digital" ? "checked" : ""}>
                    <div>
                      <strong>Full Screen Digital Clock</strong>
                      <span>Large digital clock using New York / East Coast time.</span>
                    </div>
                  </label>

                  <label class="radio-card">
                    <input type="radio" name="clockType" value="analog" ${state.clockType === "analog" ? "checked" : ""}>
                    <div>
                      <strong>Full Screen Analog Clock</strong>
                      <span>Classic analog clock using New York / East Coast time.</span>
                    </div>
                  </label>
                </div>
              </div>

              <div class="card">
                <h2>2. Choose Display Mode</h2>

                <div class="option-group">
                  <label class="radio-card">
                    <input type="radio" name="displayMode" value="clock" ${state.displayMode === "clock" ? "checked" : ""}>
                    <div>
                      <strong>Clock Only</strong>
                      <span>Shows the selected clock full screen.</span>
                    </div>
                  </label>

                  <label class="radio-card">
                    <input type="radio" name="displayMode" value="combo" ${state.displayMode === "combo" ? "checked" : ""}>
                    <div>
                      <strong>Clock + Timer</strong>
                      <span>Shows the selected clock with count up or count down below it.</span>
                    </div>
                  </label>

                  <label class="radio-card">
                    <input type="radio" name="displayMode" value="timer" ${state.displayMode === "timer" ? "checked" : ""}>
                    <div>
                      <strong>Timer Only</strong>
                      <span>Shows count up or count down full screen.</span>
                    </div>
                  </label>
                </div>
              </div>

              <div class="card">
                <h2>3. Timer Settings</h2>

                <div class="option-group">
                  <label class="radio-card">
                    <input type="radio" name="timerType" value="countdown" ${state.timerType === "countdown" ? "checked" : ""}>
                    <div>
                      <strong>Count Down</strong>
                      <span>Counts down from the time you choose.</span>
                    </div>
                  </label>

                  <label class="radio-card">
                    <input type="radio" name="timerType" value="countup" ${state.timerType === "countup" ? "checked" : ""}>
                    <div>
                      <strong>Count Up</strong>
                      <span>Counts up from zero.</span>
                    </div>
                  </label>
                </div>

                <div class="form-row">
                  <label class="small-label">
                    Minutes
                    <input id="minutesInput" type="number" min="0" value="${countdownMinutes}">
                  </label>

                  <label class="small-label">
                    Seconds
                    <input id="secondsInput" type="number" min="0" max="59" value="${countdownSeconds}">
                  </label>

                  <label class="small-label">
                    Current Timer
                    <input id="currentTimerInput" type="text" value="${formatTimer(getTimerSeconds(state))}" readonly>
                  </label>
                </div>

                <div class="button-row">
                  <button class="btn" id="applyTimeBtn">Apply Time</button>
                  <button class="btn green" id="startPauseBtn">${state.timerRunning ? "Pause" : "Start"}</button>
                  <button class="btn secondary" id="resetBtn">Reset</button>
                </div>
              </div>

              <div class="card">
                <h2>4. Screen Text</h2>

                <textarea id="messageInput" placeholder="Type words to show on the view screen...">${state.message || ""}</textarea>

                <div class="button-row">
                  <button class="btn ${state.messageVisible ? "green" : "red"}" id="showHideBtn">
                    ${state.messageVisible ? "Hide" : "Show"}
                  </button>

                  <button class="btn secondary" id="clearTextBtn">Clear Text</button>
                </div>

                <div class="status-pill">
                  <span class="status-dot"></span>
                  <span>
                    ${state.messageVisible ? "Text is showing. The clock or timer will shrink and move higher." : "Text is hidden. The clock or timer is full screen."}
                  </span>
                </div>
              </div>
            </section>
          </div>
        </main>
      `;

      attachControlEvents();
    }

    function attachControlEvents() {
      document.getElementById("setRoomBtn").addEventListener("click", () => {
        setRoom(document.getElementById("roomInput").value);
      });

      document.getElementById("copyViewBtn").addEventListener("click", async () => {
        await navigator.clipboard.writeText(getViewURL());
        alert("View link copied.");
      });

      document.querySelectorAll('input[name="clockType"]').forEach(input => {
        input.addEventListener("change", () => {
          saveState({ clockType: input.value });
        });
      });

      document.querySelectorAll('input[name="displayMode"]').forEach(input => {
        input.addEventListener("change", () => {
          saveState({ displayMode: input.value });
        });
      });

      document.querySelectorAll('input[name="timerType"]').forEach(input => {
        input.addEventListener("change", () => {
          saveState({
            timerType: input.value,
            timerRunning: false,
            timerPausedElapsed: 0,
            timerStartedAt: null
          });
        });
      });

      document.getElementById("applyTimeBtn").addEventListener("click", () => {
        const minutes = Math.max(0, Number(document.getElementById("minutesInput").value) || 0);
        const seconds = Math.min(59, Math.max(0, Number(document.getElementById("secondsInput").value) || 0));

        saveState({
          countdownSeconds: minutes * 60 + seconds,
          timerRunning: false,
          timerPausedElapsed: 0,
          timerStartedAt: null
        });
      });

      document.getElementById("startPauseBtn").addEventListener("click", () => {
        if (currentState.timerRunning) {
          saveState({
            timerRunning: false,
            timerPausedElapsed: getElapsedSeconds(currentState),
            timerStartedAt: null
          });
        } else {
          saveState({
            timerRunning: true,
            timerStartedAt: Date.now()
          });
        }
      });

      document.getElementById("resetBtn").addEventListener("click", () => {
        saveState({
          timerRunning: false,
          timerPausedElapsed: 0,
          timerStartedAt: null
        });
      });

      document.getElementById("showHideBtn").addEventListener("click", () => {
        const text = document.getElementById("messageInput").value;

        saveState({
          message: text,
          messageVisible: !currentState.messageVisible
        });
      });

      document.getElementById("clearTextBtn").addEventListener("click", () => {
        saveState({
          message: "",
          messageVisible: false
        });
      });
    }

    function createAnalogClock() {
      const numbers = Array.from({ length: 12 }, (_, index) => {
        const number = index + 1;
        const angle = number * 30;
        const x = 50 + Math.sin(angle * Math.PI / 180) * 40;
        const y = 50 - Math.cos(angle * Math.PI / 180) * 40;

        return `<div class="clock-number" style="--x:${x}%; --y:${y}%;">${number}</div>`;
      }).join("");

      return `
        <div>
          <div class="analog-clock">
            ${numbers}
            <div class="hand hour" id="hourHand"></div>
            <div class="hand minute" id="minuteHand"></div>
            <div class="hand second" id="secondHand"></div>
            <div class="center-dot"></div>
          </div>

          <div class="timezone-label">New York Time</div>
        </div>
      `;
    }

    function createClockHTML(state) {
      if (state.clockType === "analog") {
        return createAnalogClock();
      }

      return `
        <div>
          <div class="digital-clock" id="digitalClock">--:--:--</div>
          <div class="timezone-label">New York Time</div>
        </div>
      `;
    }

    function createTimerHTML(state) {
      return `
        <div>
          <div class="timer-display" id="timerDisplay">${formatTimer(getTimerSeconds(state))}</div>
          <div class="timer-label">${state.timerType === "countdown" ? "Countdown" : "Count Up"}</div>
        </div>
      `;
    }

    function renderViewPage() {
      const state = currentState;
      const hasVisibleMessage = state.messageVisible && String(state.message || "").trim().length > 0;

      let mainHTML = "";
      let modeClass = "";

      if (state.displayMode === "clock") {
        mainHTML = createClockHTML(state);
      } else if (state.displayMode === "timer") {
        mainHTML = createTimerHTML(state);
      } else {
        modeClass = "combo";
        mainHTML = createClockHTML(state) + createTimerHTML(state);
      }

      document.getElementById("app").innerHTML = `
        <main class="view-page">
          <section class="view-stage ${hasVisibleMessage ? "text-active" : ""}">
            <div class="main-display ${modeClass}">
              ${mainHTML}
            </div>

            <div class="message-display">${escapeHTML(state.message || "")}</div>
          </section>
        </main>
      `;

      updateViewDisplays();
    }

    function updateViewDisplays() {
      const digitalClock = document.getElementById("digitalClock");

      if (digitalClock) {
        digitalClock.textContent = getEastCoastDigitalTime();
      }

      const hourHand = document.getElementById("hourHand");
      const minuteHand = document.getElementById("minuteHand");
      const secondHand = document.getElementById("secondHand");

      if (hourHand && minuteHand && secondHand) {
        const angles = getEastCoastAngles();

        hourHand.style.transform = `rotate(${angles.hourAngle}deg)`;
        minuteHand.style.transform = `rotate(${angles.minuteAngle}deg)`;
        secondHand.style.transform = `rotate(${angles.secondAngle}deg)`;
      }

      const timerDisplay = document.getElementById("timerDisplay");

      if (timerDisplay) {
        timerDisplay.textContent = formatTimer(getTimerSeconds(currentState));
      }

      const currentTimerInput = document.getElementById("currentTimerInput");

      if (currentTimerInput) {
        currentTimerInput.value = formatTimer(getTimerSeconds(currentState));
      }
    }

    async function startApp() {
      if (configMissing()) {
        renderSetupPage();
        return;
      }

      const app = initializeApp(firebaseConfig);
      db = getDatabase(app);
      roomRef = ref(db, `rooms/${getRoom()}/state`);

      const snapshot = await get(roomRef);

      if (!snapshot.exists()) {
        await set(roomRef, defaultState);
      }

      onValue(roomRef, snapshot => {
        currentState = {
          ...defaultState,
          ...(snapshot.val() || {})
        };

        if (isViewPage()) {
          renderViewPage();
        } else {
          renderControlPage();
        }
      });

      setInterval(updateViewDisplays, 250);
    }

    startApp();
  </script>
</body>
</html>
